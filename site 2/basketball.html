<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Experience | Epic Shot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #court {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Tabela e Cesta */
        #hoop-container {
            position: absolute;
            top: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        #backboard {
            width: 250px;
            height: 180px;
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid rgba(197, 160, 125, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(197, 160, 125, 0.2);
            position: relative;
        }

        #backboard-inner {
            width: 80px;
            height: 60px;
            border: 2px solid rgba(197, 160, 125, 0.6);
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        #rim {
            width: 100px;
            height: 100px;
            border: 6px solid #e67e22;
            border-radius: 50%;
            transform: rotateX(80deg) translateY(-40px);
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.5);
            position: relative;
            z-index: 10;
        }

        #net {
            width: 80px;
            height: 100px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 5px,
                rgba(255, 255, 255, 0.2) 5px,
                rgba(255, 255, 255, 0.2) 6px
            ),
            repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 5px,
                rgba(255, 255, 255, 0.2) 5px,
                rgba(255, 255, 255, 0.2) 6px
            );
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%);
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
        }

        /* A Bola */
        #ball {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #e67e22, #a04000);
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 0 40px rgba(230, 126, 34, 0.3);
            border: 1px solid rgba(0,0,0,0.2);
            z-index: 8;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #ball::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 48%, #000 48%, #000 52%, transparent 52%),
                linear-gradient(0deg, transparent 48%, #000 48%, #000 52%, transparent 52%);
            opacity: 0.3;
        }

        .ui-header {
            position: absolute;
            top: 2rem;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .ui-header h1 {
            font-size: 1.5rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: #c5a07d;
            margin: 0;
            opacity: 0.7;
        }

        .click-hint {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        #btn-back {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 125, 0.3);
            color: #c5a07d;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s;
            z-index: 1000;
        }

        #btn-back:hover {
            background: rgba(197, 160, 125, 0.1);
            border-color: #c5a07d;
        }

        /* Efeito de flash no acerto */
        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="court">
        <div class="ui-header">
            <h1>The Golden Shot</h1>
        </div>

        <div id="hoop-container">
            <div id="backboard">
                <div id="backboard-inner"></div>
            </div>
            <div id="rim"></div>
            <div id="net"></div>
        </div>

        <div id="ball"></div>

        <div class="click-hint">Clique para Arremessar</div>
    </div>

    <a href="../index.html" id="btn-back">Voltar para Aroeira</a>

    <script>
        const ball = document.getElementById('ball');
        const rim = document.getElementById('rim');
        const net = document.getElementById('net');
        const flash = document.getElementById('flash');
        const court = document.getElementById('court');

        function shoot() {
            // Reset ball
            gsap.set(ball, { 
                scale: 0.1, 
                opacity: 0, 
                x: 0, 
                y: 0, 
                z: -1000,
                filter: 'blur(10px)',
                rotation: 0
            });

            const tl = gsap.timeline();

            tl.to(ball, {
                opacity: 1,
                duration: 0.2
            })
            .to(ball, {
                scale: 1,
                y: -150, // trajetória de subida
                z: 0,
                filter: 'blur(0px)',
                rotation: 360,
                duration: 1.2,
                ease: 'power2.out'
            })
            .to(ball, {
                y: -130, // caindo na cesta
                scale: 0.8,
                duration: 0.5,
                ease: 'power2.in',
                onComplete: () => {
                    // Efeito de rede e flash
                    gsap.to(net, { scaleY: 1.3, duration: 0.1, yoyo: true, repeat: 1 });
                    gsap.to(flash, { opacity: 0.2, duration: 0.1, yoyo: true, repeat: 1 });
                }
            })
            .to(ball, {
                y: 200, // saindo por baixo da cesta
                opacity: 0,
                duration: 0.8,
                ease: 'none'
            });
        }

        court.addEventListener('click', shoot);

        // Arremesso inicial automático após load
        window.addEventListener('load', () => {
            setTimeout(shoot, 1000);
        });
    </script>
</body>
</html>
